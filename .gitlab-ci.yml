stages:
    - test
    - deploy

.job_template: &test_job
    stage: test
    script:
        - phing test
    cache:
        paths:
            - vendor/
    before_script:
        - composer update --prefer-dist --no-progress --no-interaction
    rules:
        -   if: $CI_COMMIT_BRANCH

test:php8.3:
    <<: *test_job
    image: nexendrie/php:8.3

test:php8.4:
    <<: *test_job
    image: nexendrie/php:8.4

test:php8.5:
    <<: *test_job
    image: nexendrie/php:8.5

test:cc:
    <<: *test_job
    image: nexendrie/php:8.5
    coverage: '/(\d+\%) covered/'
    artifacts:
        paths:
            - coverage.xml
        reports:
            coverage_report:
                coverage_format: cobertura
                path: coverage.xml

pages:
    stage: deploy
    environment:
        name: documentation
        url: https://nexendrie.gitlab.io/rss
    image: nexendrie/php:8.5
    script:
        - composer create-project --no-dev nexendrie/site-generator
        - site-generator/bin/generate-site --source=docs --output=public
    artifacts:
        paths:
            - public
    only:
        - tags@nexendrie/rss

release:
    stage: deploy
    image: registry.gitlab.com/gitlab-org/release-cli:latest
    rules:
        -   if: $CI_COMMIT_TAG
    script:
        - echo "Creating GitLab release"
    release:
        tag_name: $CI_COMMIT_TAG
        name: "Version $CI_COMMIT_TAG"
        description: "./RELEASE_NOTES"
